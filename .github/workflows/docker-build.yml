name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*'

env:
  DOCKER_IMAGE: happy/happy_cli_claude_code_docker

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: |
          # 从 tag 中提取版本号 (v1.0.0 -> 1.0.0)
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ steps.get_version.outputs.VERSION }}
            ${{ env.DOCKER_IMAGE }}:latest
          build-args: |
            BUILD_VERSION=${{ steps.get_version.outputs.VERSION }}

      - name: Update compose.yaml image tag
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          sed -i "s|image: \${DOCKER_REGISTRY:-}${{ env.DOCKER_IMAGE }}:.*|image: \${DOCKER_REGISTRY:-}${{ env.DOCKER_IMAGE }}:${VERSION}|" compose.yaml

      - name: Commit updated compose.yaml
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add compose.yaml
          git commit -m "chore: update image tag to ${{ steps.get_version.outputs.VERSION }}" || echo "No changes to commit"
          git push origin HEAD:main || echo "Push skipped (tag build)"

      - name: Generate build summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Docker image built and pushed successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.DOCKER_IMAGE }}:${{ steps.get_version.outputs.VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Platforms:** linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Included packages:**" >> $GITHUB_STEP_SUMMARY
          echo "- happy-coder: version from dockerfile" >> $GITHUB_STEP_SUMMARY
          echo "- @slopus/agent: version from dockerfile" >> $GITHUB_STEP_SUMMARY
